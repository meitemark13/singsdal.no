<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkitekt Ola Singsdal</title>
  <meta name="description" content="Arkitekt basert i Trondheim. Arbeid i skjæringspunktet mellom materialitet, form og håndverk." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Karla:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .home-wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 4rem var(--col) 6rem;
      border-top: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem 6rem;
      align-items: start;
    }

    .home-intro p {
      font-family: var(--serif);
      font-size: clamp(1.3rem, 2.8vw, 1.8rem);
      font-weight: 400;
      line-height: 1.5;
      max-width: 26ch;
    }

    .home-nav-list {
      list-style: none;
      border-top: 1px solid var(--rule);
    }

    .home-nav-list li {
      border-bottom: 1px solid var(--rule);
    }

    .home-nav-list a {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.9rem 0;
      text-decoration: none;
      color: inherit;
      transition: color 0.25s;
    }

    .home-nav-list a:hover { color: var(--accent); }

    .home-nav-list .hn-title {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 400;
    }

    .home-nav-list .hn-arrow {
      font-size: 0.85rem;
      color: var(--muted);
      transition: transform 0.25s, color 0.25s;
    }

    .home-nav-list a:hover .hn-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    @media (max-width: 720px) {
      .home-wrap { grid-template-columns: 1fr; gap: 2.5rem; }
    }
  </style>
</head>
<body>

  <nav class="site-nav" id="sitenav">
    <div class="site-nav-inner">
      <a class="nav-name" href="index.html">Arkitekt Ola Singsdal</a>
      <ul class="nav-links">
        <li><a href="prosjekter.html">Prosjekter</a></li>
        <li><a href="tekster.html">Tekster</a></li>
        <li><a href="tegninger.html">Tegninger</a></li>
        <li><a href="trearbeid.html">Trearbeid</a></li>
        <li><a href="om.html">Om</a></li>
      </ul>
    </div>
  </nav>

  <div class="home-wrap">

    <div class="home-intro reveal">
      <p>Arbeid i skjæringspunktet mellom materialitet, form og håndverk.</p>
    </div>

    <nav class="home-nav-list reveal" data-delay="120" aria-label="Kategorier">
      <li>
        <a href="prosjekter.html">
          <span class="hn-title">Prosjekter</span>
          <span class="hn-arrow">→</span>
        </a>
      </li>
      <li>
        <a href="tekster.html">
          <span class="hn-title">Tekster</span>
          <span class="hn-arrow">→</span>
        </a>
      </li>
      <li>
        <a href="tegninger.html">
          <span class="hn-title">Tegninger</span>
          <span class="hn-arrow">→</span>
        </a>
      </li>
      <li>
        <a href="trearbeid.html">
          <span class="hn-title">Trearbeid</span>
          <span class="hn-arrow">→</span>
        </a>
      </li>
      <li>
        <a href="om.html">
          <span class="hn-title">Om</span>
          <span class="hn-arrow">→</span>
        </a>
      </li>
    </nav>

  </div>

  <footer>
    <p>Arkitekt Ola Singsdal — singsdal.no</p>
    <p>Oppdatert 2025</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
